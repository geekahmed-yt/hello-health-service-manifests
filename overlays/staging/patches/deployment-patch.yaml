apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-health-service
spec:
  template:
    spec:
      containers:
        - name: hello-health-service
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: ENVIRONMENT
              value: "staging"
            - name: CACHE_ENABLED
              value: "true"
            - name: DATABASE_HOST
              value: "postgres.staging.svc.cluster.local"
