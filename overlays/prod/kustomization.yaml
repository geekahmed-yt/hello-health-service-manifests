apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

bases:
  - ../../base

components:
  - github.com/geekahmed-yt/hello-platform-global-config/components/replicas
  - github.com/geekahmed-yt/hello-platform-global-config/components/resource-limits
  - github.com/geekahmed-yt/hello-platform-global-config/components/health-checks

patches:
  - path: patches/deployment-patch.yaml
    target:
      kind: Deployment

commonLabels:
  environment: prod
