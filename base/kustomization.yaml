apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the platform global config overlay
bases:
  - github.com/geekahmed-yt/hello-platform-global-config/bases/deployment
  - github.com/geekahmed-yt/hello-platform-global-config/bases/service

# Apply platform standard components
components:
  - github.com/geekahmed-yt/hello-platform-global-config/components/labels

# Service-specific name and common labels
commonLabels:
  app: hello-health-service
  service: health

# Patches to rename resources to service-specific names
patches:
  - path: patches/deployment-base.yaml
    target:
      kind: Deployment
  - path: patches/service-base.yaml
    target:
      kind: Service
